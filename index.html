<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Outfit:wght@100..900&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png" />

    <title>Blog preview blog-card</title>

    <style></style>
  </head>
  <body>
    <article class="blog-card">
      <img
        src="assets/images/illustration-article.svg"
        alt="Illustration for the html & css foundations blog post"
        class="blog-card__img"
      />
      <span class="blog-card__tag">Learning</span>
      <div class="blog-card__text-box">
        <p class="blog-card__publish-date">Published <time datetime="2023-12-23">21 Dec 2023</time></p>
        <h1 class="blog-card__title heading-primary">
          <a href="#" class="link">HTML & CSS foundations</a>
        </h1>
        <p class="blog-card__description">
          These languages are the backbone of every website, defining structure, content, and presentation.
        </p>
        <address class="card__author">
          <img src="assets/images/image-avatar.webp" alt="Profile picture of Greg Hooper" class="blog-card__author-img" />
          <p class="blog-card__author-name">Greg Hooper</p>
        </address>
      </div>
    </article>
  </body>
</html>
